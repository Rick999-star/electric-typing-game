<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タイピング・サーキット</title>
    <style>
        body { background-color: #1e1e2f; color: #fff; font-family: sans-serif; text-align: center; padding: 30px; margin: 0; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e2f; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #start-btn { background: #00ffcc; color: #1e1e2f; font-size: 1.5em; padding: 20px 40px; border: none; border-radius: 10px; cursor: pointer; }
        #game-container { background: #2a2a40; border: 2px solid #00ffcc; border-radius: 15px; padding: 30px; max-width: 700px; margin: 0 auto; }
        .japanese { font-size: 2em; margin: 20px 0; color: #a9b7c6; }
        .romaji { font-size: 3em; font-weight: bold; margin-bottom: 20px; color: #00ffcc; }
        .lv-btn { background: #333; color: #fff; padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; }
        .lv-btn.active { background: #ff8c00; }
        .key-row { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .key { background: #333; padding: 10px; border-radius: 5px; min-width: 30px; }
        .key.active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="start-overlay">
    <button id="start-btn">システム起動（ここをクリック）</button>
</div>

<div id="game-container">
    <div id="level-display">Lv.1選択中</div>
    <div id="level-selector">
        <button class="lv-btn active" onclick="selectLevel(0, this)">Lv.1</button>
        <button class="lv-btn" onclick="selectLevel(1, this)">Lv.2</button>
        <button class="lv-btn" onclick="selectLevel(2, this)">Lv.3</button>
        <button class="lv-btn" onclick="selectLevel(3, this)">Lv.4</button>
        <button class="lv-btn" onclick="selectLevel(4, this)">Lv.5</button>
    </div>
    <div class="japanese" id="japanese-text">準備完了</div>
    <div class="romaji" id="romaji-text">ENTERで開始</div>
</div>

<script>
    // 単語辞書（すべてNNや入力効率の良い形式で統一済み）
    const levels = [
        { name: "Lv.1 母音", words: [{ja:"青", romaji:"AO"}, {ja:"愛", romaji:"AI"}] },
        { name: "Lv.2 清音", words: [{ja:"回路", romaji:"KAIRO"}, {ja:"機械", romaji:"KIKAI"}] },
        { name: "Lv.3 濁音", words: [{ja:"電気", romaji:"DENNKI"}, {ja:"部品", romaji:"BUHINN"}] },
        { name: "Lv.4 促音・長音", words: [{ja:"ワット", romaji:"WATTO"}, {ja:"スイッチ", romaji:"SUITTI"}] },
        { name: "Lv.5 専門用語", words: [{ja:"電圧", romaji:"DENNATU"}, {ja:"電流", romaji:"DENNRYUU"}] }
    ];

    let currentLevel = 0;
    let audioCtx;

    function selectLevel(lv, btn) {
        currentLevel = lv;
        document.querySelectorAll('.lv-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('level-display').innerText = levels[lv].name + " 選択中";
    }

    document.getElementById('start-btn').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('start-overlay').style.display = 'none';
        alert("起動しました！ENTERキーでゲームを開始してください。");
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('japanese-text').innerText = "ゲーム開始！（Lv." + (currentLevel + 1) + "）";
            document.getElementById('romaji-text').innerText = levels[currentLevel].words[0].romaji;
        }
    });
</script>
</body>
</html>
