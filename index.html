<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>動作テスト</title>
</head>
<body style="background:#1e1e2f; color:#fff; text-align:center; padding:50px;">

    <div id="start-screen">
        <button id="test-btn" style="padding:20px; font-size:2em; cursor:pointer;">
            【起動テスト】ここをクリック
        </button>
    </div>

    <div id="game-screen" style="display:none;">
        <h1 id="text-display" style="font-size:3em; color:#00ffcc;">成功！ここが表示されました</h1>
        <p>キーボードを入力してみてください</p>
    </div>

    <script>
        document.getElementById('test-btn').addEventListener('click', function() {
            // 強制的に画面を切り替える
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            console.log("起動成功");
        });

        // 入力テスト
        document.addEventListener('keydown', function(e) {
            document.getElementById('text-display').innerText = "入力キー: " + e.key;
        });
    </script>
</body>
</html>
